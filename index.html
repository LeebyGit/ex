<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 뉴스 검색기</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-newspaper"></i> 키워드 뉴스 검색기</h1>
            <p class="subtitle">미리 저장한 키워드로 최신 소식을 빠르게 확인하세요</p>
        </header>

        <div class="keyword-section">
            <div class="input-group">
                <input type="text" id="keywordInput" placeholder="관심 키워드를 입력하세요 (예: AI, 기술, 스포츠)" maxlength="50">
                <button id="addKeywordBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 키워드 추가
                </button>
            </div>

            <div class="keywords-container">
                <h3><i class="fas fa-tags"></i> 저장된 키워드</h3>
                <div id="keywordsList" class="keywords-list">
                    <!-- 키워드들이 여기에 동적으로 추가됩니다 -->
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-info-circle"></i>
                    <p>아직 저장된 키워드가 없습니다. 위에서 키워드를 추가해보세요!</p>
                </div>
            </div>
        </div>

        <div class="search-section">
            <button id="searchAllBtn" class="btn btn-search">
                <i class="fas fa-search"></i> 모든 키워드 검색
            </button>
        </div>

        <div class="results-section">
            <div id="loadingIndicator" class="loading-indicator">
                <div class="spinner"></div>
                <p>최신 소식을 검색하고 있습니다...</p>
            </div>
            
            <div id="resultsContainer" class="results-container">
                <!-- 검색 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 키워드 뉴스 검색기. Made with ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
